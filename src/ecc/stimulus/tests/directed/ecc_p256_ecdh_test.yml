#
# P-256 ECDH (DH_SHARED) directed test. Drives the engine with
# KAT-supplied {privkeyB, pubkey(A), IV} under CURVE_SEL=P256 and
# compares the read-back ECC_DH_SHARED_KEY[255:0] against the KAT
# expected DH_sharedkey. Reuses the real-DRBG P-256 KAT (which already
# carries privkeyB / IV / DH_sharedkey fields populated by
# gen_secp256r1_kat.py).
---
plusargs:
  - +ECC_TEST_VECTOR_FILE='${CALIPTRA_ROOT}/src/ecc/tb/test_vectors/secp256_realdrbg_kat.hex'
  - +ECC_TEST='ECC_p256_ecdh_test'

testname: ecc_p256_ecdh_test
