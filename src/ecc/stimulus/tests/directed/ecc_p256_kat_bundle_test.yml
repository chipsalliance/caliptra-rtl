#
# Bundle: chains 5 small P-256 KAT-based tests in one sim run to
# amortize LSF/VCS init cost. Per TC: keygen (bypass), sign (bypass),
# verify, keygen_blind. One-shot at TC0: kv_illegal. Replaces the
# five individual ymls previously named ecc_p256_{keygen,sign,verify,
# keygen_blind,kv_illegal}_test.yml.
---
plusargs:
  - +ECC_TEST_VECTOR_FILE='${CALIPTRA_ROOT}/src/ecc/tb/test_vectors/secp256_kat.hex'
  - +ECC_TEST='ECC_p256_kat_bundle_test'

testname: ecc_p256_kat_bundle_test
seed: 1
