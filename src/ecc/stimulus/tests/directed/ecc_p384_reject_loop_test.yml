#
# Directed test for the P-384 HMAC-DRBG candidate-rejection loop:
# forces the SHA-384 DRBG core's HMAC_tag to {0, n, n+1, 2^384-1}
# during the privkey (KEYGEN) and k (non-det SIGN) draws and confirms
# the failure_check redirect through K3/V3 produces a valid retried
# scalar in (0, n_p384). Reuses ecc_drbg_mbedtls.hex for valid driving
# values (only TC0 is consumed; the 8 sub-ops are the test axis).
---
plusargs:
  - +ECC_TEST_VECTOR_FILE='${CALIPTRA_ROOT}/src/ecc/tb/test_vectors/ecc_drbg_mbedtls.hex'
  - +ECC_TEST='ECC_p384_reject_loop_test'

testname: ecc_p384_reject_loop_test
seed: 1
