#
# Dual-curve interleave (P-384 VERIFY <-> P-256 KEYGEN/SIGN) with the
# P-256 path driven by the real HMAC-DRBG wrapper (no SV force). Stresses
# CURVE_SEL runtime switching and ECC_INIT_LAST re-init across the two
# DRBG wrappers in a single sim with no reset between ops.
---
plusargs:
  - +ECC_TEST_VECTOR_FILE='${CALIPTRA_ROOT}/src/ecc/tb/test_vectors/secp256_realdrbg_kat.hex'
  - +ECC_P384_TEST_VECTOR_FILE='${CALIPTRA_ROOT}/src/ecc/tb/test_vectors/ecc_drbg_mbedtls.hex'
  - +ECC_TEST='ECC_p256_dualcurve_realdrbg_test'

testname: ecc_p256_dualcurve_realdrbg_test
seed: 1
