#
# Directed test for the P-256 HMAC-DRBG candidate-rejection loop:
# forces the SHA-256 DRBG core's HMAC_tag to {0, n, n+1, 2^256-1}
# during the privkey (KEYGEN) and k (non-det SIGN) draws and confirms
# the failure_check redirect through K3/V3 produces a valid retried
# scalar in (0, n). Reuses the real-DRBG P-256 KAT for valid seed /
# nonce / msg / privkey driving values.
---
plusargs:
  - +ECC_TEST_VECTOR_FILE='${CALIPTRA_ROOT}/src/ecc/tb/test_vectors/secp256_reject_kat.hex'
  - +ECC_TEST='ECC_p256_reject_loop_test'

testname: ecc_p256_reject_loop_test
seed: 1
