---
# Directed DV for `a-kv-p256-lockout`.
# Verifies that any KV transaction armed while CURVE_SEL=P256 fires
# kv_under_p256_invalid -> error_flag, and that the swwe = !curve_sel
# gates on every ecc_kv_{rd,wr}_*_ctrl field silently drop subsequent
# writes once CURVE_SEL=P256 is asserted.
# The test is vector-independent; the P-256 KAT file is loaded only to
# satisfy the existing test-vector plumbing and to put the TB on the
# CURVE_SEL=1 default path.
plusargs:
  - +ECC_TEST_VECTOR_FILE='${CALIPTRA_ROOT}/src/ecc/tb/test_vectors/secp256_kat.hex'
  - +ECC_P384_TEST_VECTOR_FILE='${CALIPTRA_ROOT}/src/ecc/tb/test_vectors/ecc_drbg_mbedtls.hex'
  - +ECC_TEST='ECC_p256_kv_illegal_test'

testname: ecc_p256_kv_illegal_test
seed: 1
