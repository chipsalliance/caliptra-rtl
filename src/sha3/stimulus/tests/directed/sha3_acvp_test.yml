# NOTE: sha3_ctrl_tb ALGO_TYPE/SHA3_MODE/SHAKE_BITS are compile-time
# parameters, not plusargs, so this covers the module's default build
# configuration (cSHAKE-256) only; other variants require a separate
# elaboration with parameter overrides.
plusargs:
  - +SHA3_ACVP_FILE='${CALIPTRA_ROOT}/src/sha3/stimulus/acvp/cSHAKE-256-635502_test.txt'

testname: sha3_acvp_test
seed: 1
