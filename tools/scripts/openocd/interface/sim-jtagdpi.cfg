# "JTAG adapter" for simulation, exposed to OpenOCD through a TCP socket
# speaking the remote_bitbang protocol. The adapter is implemented as
# SystemVerilog DPI module.

adapter driver remote_bitbang
remote_bitbang host localhost

# Read the dynamically assigned port from the port file written by the
# simulation. The file is created in the simulation working directory.
if {[info exists env(SIM_DIR)]} {
    set port_file "$env(SIM_DIR)/jtag0.port"
} else {
    set port_file "jtag0.port"
}

set timeout 60
set elapsed 0
while {![file exists $port_file]} {
    after 500
    incr elapsed 1
    if {$elapsed >= [expr {$timeout * 2}]} {
        puts "ERROR: Timed out waiting for $port_file"
        shutdown error
    }
}

set fp [open $port_file r]
set port [string trim [gets $fp]]
close $fp
remote_bitbang port $port
